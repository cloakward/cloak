# W9e — multi-arch container image for `cloakd`.
#
# Fires on `release.published`, builds for linux/amd64 + linux/arm64,
# and pushes to ghcr.io/cloakward/cloakd. The trigger is intentionally
# narrow: we never publish container images on PR or push, only on a
# tagged release that has been graduated from draft to published.
#
# GHCR access is via the built-in GITHUB_TOKEN, scoped via `permissions`
# below. Image visibility (public vs private) is controlled at the
# package level in GitHub; tracked in
# https://github.com/cloakward/cloak/issues/7.
name: docker-push

on:
  release:
    types: [published]

concurrency:
  group: docker-push-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cloakward/cloakd

jobs:
  push:
    name: build & push
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      # `packages: write` is the GHCR-push scope.
      packages: write
      # `id-token: write` is required for keyless cosign signing once
      # W9b's cosign-installer step is on `beta`. It's harmless to grant
      # ahead of time.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip the leading `v` so a tag of `v1.2.3` becomes `1.2.3`, and
      # derive the major.minor floating tag (`1.2`). `latest` is gated
      # on `github.event.release.prerelease == false` so that
      # release-candidate tags (e.g. `v0.9.0-rc1`) get the immutable
      # `:VERSION` and `:MAJOR_MINOR` tags but do NOT advance `:latest`
      # past production. release.yml passes `--prerelease` to
      # `gh release create` whenever the tag matches `-rc*|-beta*|-alpha*`,
      # so the `prerelease` bit on the published-release event is
      # reliable for this gate.
      - name: Compute version tags
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="$(echo "$TAG" | awk -F. '{print $1"."$2}')"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the tag list. `:VERSION` and `:MAJOR_MINOR` always go;
      # `:latest` is appended only when the release event flags this
      # tag as a non-prerelease. A pre-release like v0.9.0-rc1 thus
      # publishes `:0.9.0-rc1` and `:0.9` but does not move `:latest`.
      - name: Compose tag list
        id: tags
        run: |
          set -euo pipefail
          tags="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.major_minor }}"
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            tags="${tags}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "Including :latest tag (release is non-prerelease)."
          else
            echo "Skipping :latest tag (release is a pre-release)."
          fi
          {
            echo "list<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          provenance: true
          sbom: true

      # TODO(W9e/W9b): once W9b lands cosign-installer on `beta`, sign
      # the multi-arch manifest digest here:
      #
      #   - uses: sigstore/cosign-installer@v3
      #   - run: cosign sign --yes \
      #       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
      #
      # Image signing is intentionally a follow-up — it's safe to ship
      # the image first and add the signature attestation later, since
      # consumers pin by digest, not signature.
