# W9e — multi-arch container image for `cloakd`.
#
# Two native runner jobs build per-arch images (linux/amd64 on
# ubuntu-24.04, linux/arm64 on ubuntu-24.04-arm), then a third job
# stitches them into a multi-arch manifest with `docker buildx
# imagetools create`. We deliberately do NOT cross-compile inside
# Docker — the previous `FROM --platform=$BUILDPLATFORM` arrangement
# consistently failed with `error[E0463]: can't find crate for core`
# on the linux/arm64 row across four iteration attempts (see #46).
# Native compilation per arch sidesteps the problem entirely.
#
# Image visibility (public vs private) on GHCR is controlled at the
# package level in GitHub; tracked in
# https://github.com/cloakward/cloak/issues/7.
#
# Trigger: fires on `release: published` AND `workflow_dispatch`.
# Manual dispatch is useful when re-publishing to GHCR after a
# transient failure, without un-publishing the GitHub release.

name: docker-push

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag to build & push (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: docker-push-${{ github.event.release.tag_name || inputs.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cloakward/cloakd

jobs:
  # -------------------------------------------------------------------
  # Per-arch build. amd64 runs on ubuntu-24.04; arm64 runs on
  # ubuntu-24.04-arm (free-tier on public repos). Each pushes a
  # per-arch tag like `:VERSION-amd64` and outputs the resulting
  # digest so the manifest job can stitch them together.
  # -------------------------------------------------------------------
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_tag: amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            arch_tag: arm64
            runner: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      version: ${{ steps.ver.outputs.version }}
      major_minor: ${{ steps.ver.outputs.major_minor }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
      digest_amd64: ${{ steps.export.outputs.digest_amd64 }}
      digest_arm64: ${{ steps.export.outputs.digest_arm64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - name: Compute version tags
        id: ver
        env:
          REF_NAME: ${{ github.event.release.tag_name || inputs.ref }}
        run: |
          set -euo pipefail
          TAG="${REF_NAME#v}"
          MAJOR_MINOR="$(echo "$TAG" | awk -F. '{print $1"."$2}')"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          # Derive `is_prerelease` from the tag-name pattern (works on
          # both release.published and workflow_dispatch). The release
          # event's prerelease flag is empty on dispatch.
          case "$REF_NAME" in
            *-rc*|*-beta*|*-alpha*|*-pre*|*-dev*) is_pre=true ;;
            *) is_pre=false ;;
          esac
          echo "is_prerelease=$is_pre" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          # Per-arch tags. The manifest job stitches them into the
          # public-facing :VERSION / :MAJOR_MINOR / :latest tags.
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}-${{ matrix.arch_tag }}
          provenance: true
          sbom: true

      # The matrix can't write to the same output key, so we expose
      # the digest under an arch-suffixed key. The manifest job picks
      # whichever the matrix arch produced.
      - name: Export per-arch digest
        id: export
        run: |
          set -euo pipefail
          if [ "${{ matrix.arch_tag }}" = "amd64" ]; then
            echo "digest_amd64=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          else
            echo "digest_arm64=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------
  # Stitch the two per-arch images into a multi-arch manifest. Pushes
  # `:VERSION` and `:MAJOR_MINOR` always; `:latest` only on production
  # tags (gated on tag-name pattern, not release-event prerelease bit,
  # so it works on both release.published and workflow_dispatch).
  # -------------------------------------------------------------------
  manifest:
    name: stitch multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve manifest tags
        id: tags
        env:
          VERSION: ${{ needs.build.outputs.version }}
          MAJOR_MINOR: ${{ needs.build.outputs.major_minor }}
          IS_PRERELEASE: ${{ needs.build.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags=(
            "${base}:${VERSION}"
            "${base}:${MAJOR_MINOR}"
          )
          if [ "$IS_PRERELEASE" != "true" ]; then
            tags+=("${base}:latest")
            echo "Including :latest tag (tag is non-prerelease)."
          else
            echo "Skipping :latest tag (tag is a pre-release)."
          fi
          # Emit space-joined list for the buildx imagetools call below.
          echo "list=${tags[*]}" >> "$GITHUB_OUTPUT"
          # Per-arch source images that the manifest will reference.
          echo "src_amd64=${base}:${VERSION}-amd64" >> "$GITHUB_OUTPUT"
          echo "src_arm64=${base}:${VERSION}-arm64" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          tag_args=""
          for t in ${{ steps.tags.outputs.list }}; do
            tag_args="${tag_args} --tag ${t}"
          done
          # shellcheck disable=SC2086
          docker buildx imagetools create ${tag_args} \
            "${{ steps.tags.outputs.src_amd64 }}" \
            "${{ steps.tags.outputs.src_arm64 }}"

      - name: Verify manifest is multi-arch
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools inspect "${base}:${VERSION}"
