name: homebrew-bump

# Bumps the Homebrew formula in cloakward/homebrew-cloak whenever a GitHub
# release is published. The cred-blocker (HOMEBREW_TAP_TOKEN secret + tap
# repo creation) is tracked at:
#   https://github.com/cloakward/cloak/issues/5
# If the secret is absent we skip cleanly so the release still publishes.

on:
  release:
    types: [published]
  # Manual dispatch for re-running against an existing release tag —
  # same pattern as npm-publish.yml and docker-push.yml. Useful when
  # the tap repo + token weren't configured at the time the release
  # was first published, so the auto-fire skipped with a warning.
  workflow_dispatch:
    inputs:
      ref:
        description: "Release tag to bump (e.g. v0.9.0-rc2)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump:
    name: Bump cloakward/homebrew-cloak
    runs-on: ubuntu-latest
    steps:
      - name: Check tap credential
        id: cred
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::warning title=homebrew-bump skipped::HOMEBREW_TAP_TOKEN not set; tap repo not yet configured (see cloakward/cloak#5). Release will publish without Homebrew."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse release tag
        if: steps.cred.outputs.skip == 'false'
        id: tag
        env:
          # Honor either the release event or the manual dispatch input.
          TAG: ${{ github.event.release.tag_name || inputs.ref }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "::error::no tag resolved (release.tag_name and inputs.ref both empty)"
            exit 1
          fi
          # Strip leading "v" if present.
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.cred.outputs.skip == 'false'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Resolve release asset URLs and SHA256s
        if: steps.cred.outputs.skip == 'false'
        id: assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
          REPO: ${{ github.repository }}
          COSIGN_EXPERIMENTAL: "1"
          # Workflow ref must match release.yml on the tagged commit.
          EXPECTED_ISSUER: "https://token.actions.githubusercontent.com"
          EXPECTED_IDENTITY_REGEX: "^https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.event.release.tag_name || inputs.ref }}$"
        run: |
          set -euo pipefail

          # Expected asset filenames produced by the release workflow.
          # Pattern: cloak-<version>-<target-triple>.tar.gz (version without the leading "v").
          MAC_ARM64="cloak-${VERSION}-aarch64-apple-darwin.tar.gz"
          MAC_X86_64="cloak-${VERSION}-x86_64-apple-darwin.tar.gz"
          LINUX_X86_64="cloak-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          # LINUX_ARM64="cloak-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          # ^ uncomment when the release workflow produces a linux/arm64 tarball.

          # Fetch release JSON.
          RELEASE_JSON="$(gh api "repos/${REPO}/releases/tags/${TAG}")"

          resolve_url() {
            local name="$1"
            jq -r --arg n "$name" '.assets[] | select(.name == $n) | .browser_download_url' <<<"$RELEASE_JSON"
          }

          MAC_ARM64_URL="$(resolve_url "$MAC_ARM64")"
          MAC_X86_64_URL="$(resolve_url "$MAC_X86_64")"
          LINUX_X86_64_URL="$(resolve_url "$LINUX_X86_64")"

          for pair in \
              "macOS arm64:$MAC_ARM64_URL" \
              "macOS x86_64:$MAC_X86_64_URL" \
              "linux x86_64:$LINUX_X86_64_URL"; do
            label="${pair%%:*}"
            url="${pair#*:}"
            if [ -z "$url" ] || [ "$url" = "null" ]; then
              echo "::error::Missing release asset for ${label} (expected one of ${MAC_ARM64} / ${MAC_X86_64} / ${LINUX_X86_64})"
              exit 1
            fi
          done

          mkdir -p dl

          # Download the tarball + its cosign signature/cert and verify the
          # signature against the release.yml workflow identity BEFORE we
          # compute the sha that gets baked into the Homebrew formula. This
          # gives Homebrew users supply-chain parity with `gh release
          # download` users (who would otherwise be the only ones to detect
          # tampering via cosign verify-blob).
          verify_blob() {
            local url="$1"
            local out
            out="dl/$(basename "$url")"
            curl -sSfL "$url"        -o "${out}"
            curl -sSfL "${url}.sig"  -o "${out}.sig"
            curl -sSfL "${url}.cert" -o "${out}.cert"
            if ! cosign verify-blob \
                --certificate "${out}.cert" \
                --signature "${out}.sig" \
                --certificate-oidc-issuer "$EXPECTED_ISSUER" \
                --certificate-identity-regexp "$EXPECTED_IDENTITY_REGEX" \
                "${out}" >&2; then
              echo "::error::cosign verify-blob FAILED for $(basename "$url"); refusing to bump Homebrew formula."
              exit 1
            fi
          }

          sha_of() {
            local url="$1"
            local out
            out="dl/$(basename "$url")"
            verify_blob "$url"
            sha256sum "$out" | awk '{print $1}'
          }

          MAC_ARM64_SHA="$(sha_of "$MAC_ARM64_URL")"
          MAC_X86_64_SHA="$(sha_of "$MAC_X86_64_URL")"
          LINUX_X86_64_SHA="$(sha_of "$LINUX_X86_64_URL")"

          {
            echo "mac_arm64_url=${MAC_ARM64_URL}"
            echo "mac_arm64_sha=${MAC_ARM64_SHA}"
            echo "mac_x86_64_url=${MAC_X86_64_URL}"
            echo "mac_x86_64_sha=${MAC_X86_64_SHA}"
            echo "linux_x86_64_url=${LINUX_X86_64_URL}"
            echo "linux_x86_64_sha=${LINUX_X86_64_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Render Formula/cloak.rb
        if: steps.cred.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          MAC_ARM64_URL: ${{ steps.assets.outputs.mac_arm64_url }}
          MAC_ARM64_SHA: ${{ steps.assets.outputs.mac_arm64_sha }}
          MAC_X86_64_URL: ${{ steps.assets.outputs.mac_x86_64_url }}
          MAC_X86_64_SHA: ${{ steps.assets.outputs.mac_x86_64_sha }}
          LINUX_X86_64_URL: ${{ steps.assets.outputs.linux_x86_64_url }}
          LINUX_X86_64_SHA: ${{ steps.assets.outputs.linux_x86_64_sha }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cat > tap/Formula/cloak.rb <<EOF
          class Cloak < Formula
            desc "MCP-native local secrets vault"
            homepage "https://github.com/cloakward/cloak"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${MAC_ARM64_URL}"
                sha256 "${MAC_ARM64_SHA}"
              end
              on_intel do
                url "${MAC_X86_64_URL}"
                sha256 "${MAC_X86_64_SHA}"
              end
            end

            on_linux do
              # on_arm do
              #   url "<linux-arm64-tarball-url>"
              #   sha256 "<sha>"
              # end
              # ^ uncomment when the release workflow produces a linux/arm64 tarball.
              on_intel do
                url "${LINUX_X86_64_URL}"
                sha256 "${LINUX_X86_64_SHA}"
              end
            end

            depends_on "libsodium"

            def install
              bin.install "bin/cloak"
              bin.install "bin/cloakd"
              # cloak-mcp is bundled in the macOS arm64, macOS x64, and Linux
              # gnu amd64 tarballs (the platforms `bun --compile` can target
              # from the release runners). Install if present.
              bin.install "bin/cloak-mcp" if File.exist?("bin/cloak-mcp")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cloak --version")
            end
          end
          EOF

      - name: Checkout cloakward/homebrew-cloak
        if: steps.cred.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: cloakward/homebrew-cloak
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-cloak

      - name: Commit formula and open PR
        if: steps.cred.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
        working-directory: homebrew-cloak
        run: |
          set -euo pipefail
          mkdir -p Formula
          cp ../tap/Formula/cloak.rb Formula/cloak.rb

          git config user.name "cloak-release-bot"
          git config user.email "release-bot@users.noreply.github.com"

          BRANCH="bump/cloak-${VERSION}"
          git checkout -b "$BRANCH"

          # Stage first, then diff against HEAD. `git diff --quiet`
          # alone misses brand-new (untracked) files — that's what
          # tripped this on the very first formula bump for an empty
          # tap repo. With the file staged, `git diff --cached` sees
          # the add as a change and we proceed to push + PR.
          git add Formula/cloak.rb
          if git diff --cached --quiet -- Formula/cloak.rb; then
            echo "::notice::Formula/cloak.rb already up to date for ${VERSION}; nothing to do."
            exit 0
          fi

          git commit -m "cloak ${VERSION}"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --repo cloakward/homebrew-cloak \
            --base main \
            --head "$BRANCH" \
            --title "cloak ${VERSION}" \
            --body "Automated formula bump for [cloak ${TAG}](https://github.com/${{ github.repository }}/releases/tag/${TAG})."
