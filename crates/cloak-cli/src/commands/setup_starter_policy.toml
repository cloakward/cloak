# Cloak starter policy — written by `cloak setup`.
#
# Posture: default-deny. Nothing is allowed until you opt in below.
# Edit this file to allow specific (secret, tool, host) combinations.
# See `scripts/policy.example.toml` in the Cloak repo for a worked
# example. Restart `cloakd` after editing (`cloak daemon restart`).

[default]
# Action when no rule matches. Leaving this as "deny" is the safest
# posture: explicit per-secret rules below opt specific calls in.
action = "deny"

# Token-bucket rate limit applied per (peer, secret, tool) tuple.
[default.rate_limit]
burst = 10
refill_per_minute = 30

# ---- Per-tool defaults ---------------------------------------------------
# Override these by adding `[secrets.tools.<tool>]` blocks under a
# `[[secrets]]` rule below.

[tools.proxy_authenticated_http_request]
# Empty allowlist = deny all. Populate `allowed_hosts` per-secret.
allowed_hosts = []
require_confirmation = false

[tools.sign_request]
require_confirmation = false

[tools.mint_short_lived_token]
# Minting credentials emits a token to the client; require an explicit
# user confirmation prompt for every call.
require_confirmation = true
confirmation_timeout_seconds = 30

[tools.query_audit]
# Reading the audit log is read-only and safe for any authenticated peer.
allow = true

# ---- Per-secret rules ----------------------------------------------------
# Uncomment one of the blocks below (or copy a pattern) to enable a
# specific secret. Most-specific glob wins; ties break by file order.

# [[secrets]]
# name = "OPENAI_API_KEY"
# kind = "api_key"
# [secrets.tools.proxy_authenticated_http_request]
# allowed_hosts = ["api.openai.com"]

# [[secrets]]
# name = "GITHUB_TOKEN"
# kind = "api_key"
# [secrets.tools.proxy_authenticated_http_request]
# allowed_hosts = ["api.github.com", "uploads.github.com"]

# [[secrets]]
# name = "AWS_*"
